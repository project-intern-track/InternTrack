name: Deploy InternTrack to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # ── BACKEND: Install PHP dependencies in CI ──────────────────────────
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pdo, pdo_mysql, bcmath, soap, intl, gd, exif, iconv
          coverage: none

      - name: Install Composer Dependencies
        run: |
          cd backend
          composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      # ── FRONTEND: Build React app ─────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install and Build Frontend
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          npm install
          npm run build

      # ── MERGE: Copy Laravel's index.php into dist/ with corrected paths ──
      # backend-app/ sits next to public_html/ on the server, so all Laravel
      # bootstrap paths go up one level then into backend-app/
      - name: Prepare Laravel entry point for public_html
        run: |
          cp backend/public/index.php dist/index.php
          sed -i "s|__DIR__.'/../storage|__DIR__.'/../backend-app/storage|g" dist/index.php
          sed -i "s|__DIR__.'/../vendor|__DIR__.'/../backend-app/vendor|g" dist/index.php
          sed -i "s|__DIR__.'/../bootstrap|__DIR__.'/../backend-app/bootstrap|g" dist/index.php

      # ── ENV: Write .env in CI runner — no SSH heredoc indentation issues ─
      # Secrets are passed as env vars so their values are never exposed in
      # the workflow YAML. The output file is deployed alongside the backend.
      - name: Create production .env
        env:
          V_APP_KEY: ${{ secrets.APP_KEY }}
          V_DOMAIN: ${{ secrets.HOSTINGER_DOMAIN }}
          V_DB_DATABASE: ${{ secrets.DB_DATABASE }}
          V_DB_USERNAME: ${{ secrets.DB_USERNAME }}
          V_DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          V_MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          V_MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        run: |
          {
            echo "APP_NAME=InternTrack"
            echo "APP_ENV=production"
            echo "APP_DEBUG=false"
            echo "APP_KEY=${V_APP_KEY}"
            echo "APP_URL=https://${V_DOMAIN}"
            echo "APP_TIMEZONE=Asia/Manila"
            echo ""
            echo "DB_CONNECTION=mysql"
            echo "DB_HOST=127.0.0.1"
            echo "DB_PORT=3306"
            echo "DB_DATABASE=${V_DB_DATABASE}"
            echo "DB_USERNAME=${V_DB_USERNAME}"
            echo "DB_PASSWORD=${V_DB_PASSWORD}"
            echo ""
            echo "SESSION_DRIVER=cookie"
            echo "SANCTUM_STATEFUL_DOMAINS=${V_DOMAIN}"
            echo "FRONTEND_URL=https://${V_DOMAIN}"
            echo ""
            echo "MAIL_MAILER=smtp"
            echo "MAIL_HOST=smtp.gmail.com"
            echo "MAIL_PORT=587"
            echo "MAIL_USERNAME=${V_MAIL_USERNAME}"
            echo "MAIL_PASSWORD=${V_MAIL_PASSWORD}"
            echo "MAIL_FROM_ADDRESS=\"${V_MAIL_USERNAME}\""
            echo "MAIL_FROM_NAME=InternTrack"
            echo ""
            echo "QUEUE_CONNECTION=database"
            echo "CACHE_STORE=database"
          } > backend/backend.env

      # ── DEPLOY: Backend (with vendor/ and backend.env) to backend-app/ ───
      - name: Deploy Backend to Hostinger
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          ARGS: "-avz --delete"
          REMOTE_HOST: ${{ secrets.HOSTINGER_SERVER_IP }}
          REMOTE_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          REMOTE_PORT: 65002
          SOURCE: "backend/"
          TARGET: "/home/${{ secrets.HOSTINGER_SSH_USER }}/domains/${{ secrets.HOSTINGER_DOMAIN }}/backend-app/"
          EXCLUDE: "/node_modules/, .env, .git/, /storage/logs/*, /storage/framework/cache/*"

      # ── DEPLOY: Frontend dist/ (+ Laravel index.php) to public_html/ ─────
      - name: Deploy Frontend to public_html
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          ARGS: "-avz --delete"
          REMOTE_HOST: ${{ secrets.HOSTINGER_SERVER_IP }}
          REMOTE_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          REMOTE_PORT: 65002
          SOURCE: "dist/"
          TARGET: "/home/${{ secrets.HOSTINGER_SSH_USER }}/domains/${{ secrets.HOSTINGER_DOMAIN }}/public_html/"
          EXCLUDE: ".git/"

      # ── POST-DEPLOY: Activate .env + run artisan commands on server ───────
      - name: Configure and Finalize Laravel on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_SERVER_IP }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          port: 65002
          key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          script: |
            BACKEND_PATH="/home/${{ secrets.HOSTINGER_SSH_USER }}/domains/${{ secrets.HOSTINGER_DOMAIN }}/backend-app"

            # Ensure storage dirs exist (first deploy)
            mkdir -p $BACKEND_PATH/storage/logs
            mkdir -p $BACKEND_PATH/storage/framework/{cache,sessions,views}
            mkdir -p $BACKEND_PATH/bootstrap/cache

            cd $BACKEND_PATH

            # Activate the .env written cleanly by the CI runner
            mv backend.env .env

            # Optimize for production
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan migrate --force
            php artisan db:seed --force

            # Fix storage permissions
            chmod -R 775 storage bootstrap/cache
